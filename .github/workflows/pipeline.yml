name: FPL Daily Update

# Upstream FPL-Core-Insights dataset refreshes 2×/day at ~05:00 + 17:00 UTC.
# Run pipeline 30 min after each refresh to consume latest CSVs.
on:
  schedule:
    - cron: '30 5,17 * * *'  # 05:30 + 17:30 UTC daily
  workflow_dispatch:          # Manual trigger

permissions:
  contents: write

# Avoid concurrent runs racing on git push if 05:30 run still in flight.
concurrency:
  group: fpl-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run pipeline
      # main.py calls refresh_data() internally, trains any missing models,
      # auto-recalibrates points/minutes heads when JSON > RECALIB_STALE_DAYS,
      # runs the optimizer, writes data/processed/lineup.md.
      run: python src/main.py

    - name: Publish lineup to Job Summary
      run: cat data/processed/lineup.md >> $GITHUB_STEP_SUMMARY

    - name: Commit and push changes
      # Season Replay workflow uses a different concurrency group, so its push
      # can land between our checkout and push. Rebase-and-retry on reject.
      run: |
        set -e
        git config --global user.name "FPL Bot"
        git config --global user.email "bot@noreply.github.com"

        # Data CSVs, model artifacts, recalib JSONs, snapshot, lineup report.
        git add -f data/*.csv data/*.json data/processed/lineup.md data/processed/squad_snapshot.csv 2>/dev/null || true

        if git diff --staged --quiet; then
          echo "No changes to commit."
          exit 0
        fi
        git commit -m "Pipeline run $(date -u +'%Y-%m-%d %H:%M UTC')"
        for i in 1 2 3 4 5; do
          git pull --rebase origin main && git push && exit 0
          echo "Push attempt $i failed; retrying after backoff."
          sleep $((i * 5))
        done
        echo "Push failed after retries." >&2
        exit 1
